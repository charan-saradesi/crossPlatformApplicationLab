<ion-header>
  <ion-toolbar color="dark">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Explore</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card>
    <img src="./assets/img.png" alt="travel">

    <ion-card-header>
      <ion-card-title>Discover Places</ion-card-title>
      <ion-card-subtitle>Choose your next trip</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
      Tap below to perform actions like booking, saving or sharing destinations.
    </ion-card-content>
  </ion-card>

  <ion-button expand="block" color="warning" (click)="presentActionSheet()">
    <ion-icon name="options" slot="start"></ion-icon>
    Choose Action
  </ion-button>

  <ion-card *ngIf="lastAction">
    <ion-card-content>
      ✅ Selected: <strong>{{ lastAction }}</strong>
    </ion-card-content>
  </ion-card>

</ion-content>
