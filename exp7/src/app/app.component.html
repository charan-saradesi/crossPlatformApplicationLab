<ion-app>

  <ion-menu contentId="main-content" menuId="mainMenu">
    <ion-header>
      <ion-toolbar color="light">
        <ion-title>🌍 Travel App</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <ion-list>

        <ion-item button routerLink="/tabs/tab1" (click)="closeMenu()">
          <ion-icon name="compass" slot="start"></ion-icon>
          <ion-label>Explore</ion-label>
        </ion-item>

        <ion-item button routerLink="/tabs/tab2" (click)="closeMenu()">
          <ion-icon name="images" slot="start"></ion-icon>
          <ion-label>Gallery</ion-label>
        </ion-item>

        <ion-item button routerLink="/tabs/tab3" (click)="closeMenu()">
          <ion-icon name="person" slot="start"></ion-icon>
          <ion-label>Profile</ion-label>
        </ion-item>

      </ion-list>
    </ion-content>
  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>

</ion-app>
